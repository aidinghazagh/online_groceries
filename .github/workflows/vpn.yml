name: Password_Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel-build:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Create SOCKS Proxy
        run: |
          # -D 1080 creates a SOCKS proxy on localhost:1080
          # -f tells ssh to go to background (though in GH Actions we need it to stay alive)
          # We use a trick to keep it running for the duration of the job
          sshpass -p "${{ secrets.REMOTE_PASSWORD }}" ssh -o StrictHostKeyChecking=no -D 1080 ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} -N &
          sleep 10 # Wait for connection to establish
      - name: Set Proxy Environment
        run: |
          echo "http_proxy=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          echo "https_proxy=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          echo "all_proxy=socks5://127.0.0.1:1080" >> $GITHUB_ENV
      - name: Verify Proxy Connection
        run: |
          echo "--- Testing Proxy via curl ---"
          # Force curl to use the proxy explicitly to ensure the test is valid
          curl -x socks5h://127.0.0.1:1080 -L https://ifconfig.me || echo "Proxy connection failed"
          
          echo "--- Testing Organization Info ---"
          # Using ipinfo.io which is more reliable for automation
          curl -x socks5h://127.0.0.1:1080 -L https://ipinfo.io/org || echo "Could not fetch Org info"
                
